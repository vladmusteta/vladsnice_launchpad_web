---
- name: Check if Monitoring service exists on Windows
  hosts: provisioning_servers
  gather_facts: false

  vars:
    services_to_check:
      - PatrolAgent
      - inc_PrometheusAgent
      - splunk-otel-collector
 
  tasks:
    - name: Query service existence
      ansible.windows.win_service_info:
        name: "{{ item }}"
      register: service_results
      ignore_errors: true
      loop: "{{ services_to_check }}"
 
    - name: Report service existence
      ansible.builtin.debug:
        msg: >-
          {{
            'Service "' ~ item.item ~ '" EXISTS on ' ~ inventory_hostname ~
            ' (state: ' ~ item.services[0].state ~ ')'
            if item.services | length > 0
            else 'Service "' ~ item.item ~ '" does NOT exist on ' ~ inventory_hostname
          }}
      loop: "{{ service_results.results }}"
      loop_control:
        label: "{{ item.item }}"
