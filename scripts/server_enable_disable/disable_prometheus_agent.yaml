---
# =============================================================================
# Prometheus Agent - Disable Playbook
# =============================================================================
# Stops the inc_PrometheusAgent service and sets its start type to Disabled.
# Software and folder are left intact.
#
# Called by disable_monitoring_tools.yaml.
# Can also be run standalone:
#   ansible-playbook disable_prometheus_agent.yaml
#   ansible-playbook disable_prometheus_agent.yaml -e "disable_prometheus=false"
# =============================================================================

- name: Disable Prometheus Agent service (inc_PrometheusAgent)
  hosts: provisioning_servers
  gather_facts: false
  any_errors_fatal: false

  vars:
    # Default fallback when run standalone - overridden by fact from main playbook
    disable_prometheus: true

    prometheus_service_name: 'inc_PrometheusAgent'

  tasks:

    # -----------------------------------------------------------------------
    # 0. Skip this host entirely if toggle is false
    # -----------------------------------------------------------------------
    - name: Skip Prometheus disable on this host (disable_prometheus is false)
      ansible.builtin.meta: end_host
      when: not (disable_prometheus | bool)

    # -----------------------------------------------------------------------
    # 1. Check if the Prometheus Agent service exists
    # -----------------------------------------------------------------------
    - name: Check if Prometheus Agent service exists
      ansible.windows.win_powershell:
        script: |
          $svc = Get-Service -Name "{{ prometheus_service_name }}" -ErrorAction SilentlyContinue
          if ($svc) { "exists" } else { "not_found" }
      register: prometheus_svc_check
      failed_when: false

    - name: Prometheus Agent service not found - skipping this host
      ansible.builtin.debug:
        msg: "Service '{{ prometheus_service_name }}' not found on {{ inventory_hostname }}. Skipping."
      when: "'not_found' in prometheus_svc_check.output"

    - name: End host if Prometheus Agent service is not present
      ansible.builtin.meta: end_host
      when: "'not_found' in prometheus_svc_check.output"

    # -----------------------------------------------------------------------
    # 2. Stop the Prometheus Agent service
    # -----------------------------------------------------------------------
    - name: Stop Prometheus Agent service
      ansible.windows.win_service:
        name: "{{ prometheus_service_name }}"
        state: stopped
        force_dependent_services: true
      register: stop_result
      failed_when: false

    - name: Show stop result
      ansible.builtin.debug:
        msg: "Stop result for '{{ prometheus_service_name }}' on {{ inventory_hostname }}: {{ stop_result.state | default('(no state returned)') }}"

    # -----------------------------------------------------------------------
    # 3. Set Prometheus Agent service start type to Disabled
    # -----------------------------------------------------------------------
    - name: Set Prometheus Agent service start type to Disabled
      ansible.windows.win_service:
        name: "{{ prometheus_service_name }}"
        start_mode: disabled
      register: disable_result

    - name: Confirm Prometheus Agent service is disabled
      ansible.builtin.debug:
        msg: "Service '{{ prometheus_service_name }}' on {{ inventory_hostname }} is now stopped and disabled."
