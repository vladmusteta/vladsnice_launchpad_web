---
# =============================================================================
# Monitoring Tools Enable - Main Orchestration Playbook
# =============================================================================
# Sets service start type to Auto and starts monitoring agent services.
#
# Sub-playbooks (must be in the same directory):
#   enable_bmc_patrol.yaml        - Enables and starts BMC Patrol Agent
#   enable_prometheus_agent.yaml  - Enables and starts inc_PrometheusAgent
#
# Usage:
#   ansible-playbook enable_monitoring_tools.yaml
#   ansible-playbook enable_monitoring_tools.yaml -e "enable_bmc_patrol=false"
#   ansible-playbook enable_monitoring_tools.yaml -e "enable_prometheus=false"
# =============================================================================

- name: Monitoring Tools Enable - Scope Configuration
  hosts: provisioning_servers
  gather_facts: false

  vars:
    # ------------------------------------------------------------------
    # Set to true to enable, false to skip
    # ------------------------------------------------------------------
    enable_bmc_patrol: true
    enable_prometheus: true

  tasks:
    - name: Show enable scope
      ansible.builtin.debug:
        msg:
          - "BMC Patrol / BMC Software enable : {{ enable_bmc_patrol }}"
          - "Prometheus Agent enable           : {{ enable_prometheus }}"
      run_once: true

    # Push toggles as host facts so sub-playbooks can read them locally
    # without relying on hostvars['localhost'] across play boundaries.
    - name: Set toggle facts on all target hosts
      ansible.builtin.set_fact:
        enable_bmc_patrol: "{{ enable_bmc_patrol | bool }}"
        enable_prometheus: "{{ enable_prometheus | bool }}"

# NOTE: import_playbook does not support 'when' conditions in any Ansible
# version. Skip logic is handled inside each sub-playbook via meta: end_host,
# reading the facts set above.
- import_playbook: enable_bmc_patrol.yaml
- import_playbook: enable_prometheus_agent.yaml
