---
# =============================================================================
# Monitoring Tools Decommission - Main Orchestration Playbook
# =============================================================================
# This is the ONLY file you need to run. Edit the two toggles below to control
# which tools get decommissioned. The sub-playbooks are called automatically.
#
# Sub-playbooks (must be in the same directory):
#   remove_bmc_patrol.yaml        - Uninstalls BMC Patrol / BMC Software
#   remove_prometheus_agent.yaml  - Removes inc_PrometheusAgent + folder
#
# Usage:
#   ansible-playbook decommission_monitoring_tools.yaml
#   ansible-playbook decommission_monitoring_tools.yaml -e "remove_bmc_patrol=false"
#   ansible-playbook decommission_monitoring_tools.yaml -e "remove_prometheus=false"
# =============================================================================

- name: Monitoring Tools Decommission - Scope Configuration
  hosts: provisioning_servers
  gather_facts: false

  vars:
    # ------------------------------------------------------------------
    # Set to true to decommission, false to skip
    # ------------------------------------------------------------------
    remove_bmc_patrol: true
    remove_prometheus: true

  tasks:
    - name: Show decommission scope
      ansible.builtin.debug:
        msg:
          - "BMC Patrol / BMC Software removal : {{ remove_bmc_patrol }}"
          - "Prometheus Agent removal           : {{ remove_prometheus }}"
      run_once: true

    # Push toggles as host facts so sub-playbooks can read them locally
    # without relying on hostvars['localhost'] across play boundaries.
    - name: Set toggle facts on all target hosts
      ansible.builtin.set_fact:
        remove_bmc_patrol: "{{ remove_bmc_patrol | bool }}"
        remove_prometheus: "{{ remove_prometheus | bool }}"

# NOTE: import_playbook does not support 'when' conditions in any Ansible
# version. Skip logic is handled inside each sub-playbook via meta: end_host,
# reading the facts set above.
- import_playbook: remove_bmc_patrol.yaml
- import_playbook: remove_prometheus_agent.yaml
