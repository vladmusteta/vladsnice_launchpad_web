---
- name: Deploy counters_list.json to PrometheusAgent
  hosts: provisioning_servers
  gather_facts: false

  vars:
    source_file: "/etc/ansible/gum/ansible/assets/counters_list.json"
    destination_dir: "D:\\EnttoolsPrometheusAgent"
    destination_file: "D:\\EnttoolsPrometheusAgent\\counters_list.json"
    backup_dir: "D:\\Backup"
    service_name: "inc_PrometheusAgent"
    temp_file: "D:\\counters_list.json"

  tasks:

    - name: Copy counters_list.json to D drive (temp location)
      ansible.windows.win_copy:
        src: "{{ source_file }}"
        dest: "{{ temp_file }}"

    - name: Stop the inc_PrometheusAgent service
      ansible.windows.win_service:
        name: "{{ service_name }}"
        state: stopped

    - name: Ensure backup directory exists
      ansible.windows.win_file:
        path: "{{ backup_dir }}"
        state: directory

    - name: Back up existing counters_list.json to D:\Backup
      ansible.windows.win_copy:
        src: "{{ destination_file }}"
        dest: "{{ backup_dir }}\\counters_list.json"
        remote_src: true
      ignore_errors: true  # Skip if no existing file to back up

    - name: Copy new counters_list.json to EnttoolsPrometheusAgent directory
      ansible.windows.win_copy:
        src: "{{ source_file }}"
        dest: "{{ destination_file }}"

    - name: Start the inc_PrometheusAgent service
      ansible.windows.win_service:
        name: "{{ service_name }}"
        state: started

    - name: Clean up temp file from D drive root
      ansible.windows.win_file:
        path: "{{ temp_file }}"
        state: absent
