
---
- hosts: provisioning_servers
  gather_facts: no
  tasks:
    # -----------------------------------------------------------------------
    # 1. Detect D drive
    # -----------------------------------------------------------------------
    - name: Check if D drive exists
      win_stat:
        path: D:\
      register: d_exists

    - name: Set install drive facts
      set_fact:
        install_drive:      "{{ 'D' if d_exists.stat.exists else 'C' }}"
        install_zip_dest:   "{{ 'D' if d_exists.stat.exists else 'C' }}:\\WIN_PA_AgentOnly_25_4.zip"
        install_dir:        "{{ 'D' if d_exists.stat.exists else 'C' }}:\\WIN_PA_AgentOnly_25_4"
        hotfix_zip_dest:    "{{ 'D' if d_exists.stat.exists else 'C' }}:\\WIN_PA_AgentOnly_25_4_hotfix.zip"
        hotfix_dir:         "{{ 'D' if d_exists.stat.exists else 'C' }}:\\WIN_PA_AgentOnly_25_4_hotfix"
        install_script_src: "{{ '/etc/ansible/gum/ansible/assets/server_build_assets/patrol/run_patrol_agent25_install_d.ps1' if d_exists.stat.exists else '/etc/ansible/gum/files/ansible/assets/server_build_assets/patrol/run_patrol_install_c.ps1' }}"
        install_script_dest: "{{ 'D' if d_exists.stat.exists else 'C' }}:\\run_install.ps1"

    - name: Show detected install drive
      debug:
        msg: "Installing on {{ install_drive }} drive"

    # -----------------------------------------------------------------------
    # 2. Copy and extract installer
    # -----------------------------------------------------------------------
    - name: Copy Helix install zip to target drive
      win_copy:
        src: /etc/ansible/gum/ansible/assets/server_build_assets/patrol/WIN_PA_AgentOnly_25_4.zip
        dest: "{{ install_zip_dest }}"

    - name: Unzip Helix installer
      win_unzip:
        src: "{{ install_zip_dest }}"
        dest: "{{ install_dir }}"
        delete_archive: yes

    # -----------------------------------------------------------------------
    # 3. Copy and extract hotfix
    # -----------------------------------------------------------------------
    - name: Copy hotfix zip to target drive
      win_copy:
        src: /etc/ansible/gum/ansible/assets/server_build_assets/patrol/WIN_PA_AgentOnly_25_4_hotfix.zip
        dest: "{{ hotfix_zip_dest }}"

    - name: Unzip hotfix archive
      win_unzip:
        src: "{{ hotfix_zip_dest }}"
        dest: "{{ hotfix_dir }}"
        delete_archive: yes

    # -----------------------------------------------------------------------
    # 4. Copy opendatagateway.current to target drive staging area
    # -----------------------------------------------------------------------
    - name: Copy opendatagateway.current to target drive
      win_copy:
        src: /etc/ansible/gum/ansible/assets/server_build_assets/patrol/opendatagateway.current
        dest: "{{ install_drive }}:\\opendatagateway.current"

    # -----------------------------------------------------------------------
    # 5. Copy and execute install script
    # -----------------------------------------------------------------------
    - name: Copy PowerShell install script to target drive
      win_copy:
        src: "{{ install_script_src }}"
        dest: "{{ install_script_dest }}"

    - name: Execute PowerShell install script
      win_shell: "{{ install_script_dest }}"
      register: install_output

    - name: Show install output
      debug:
        var: install_output

    # -----------------------------------------------------------------------
    # 6. Stop PatrolAgent service after install
    # -----------------------------------------------------------------------
    - name: Stop PatrolAgent service
      win_service:
        name: PatrolAgent
        state: stopped

    # -----------------------------------------------------------------------
    # 7. Delete sks-*-v10.db file
    # -----------------------------------------------------------------------
    - name: Find sks-*-v10.db file in SKS security folder
      win_find:
        paths: 'D:\BMC Software\common\security\sks'
        patterns: '*-v10.db'
      register: sks_v10_files

    - name: Remove sks-*-v10.db file(s)
      win_file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ sks_v10_files.files }}"

    # -----------------------------------------------------------------------
    # 8. Apply hotfix binaries
    # -----------------------------------------------------------------------
    - name: Copy PatrolAgent.exe from hotfix to Patrol3\bin
      win_copy:
        src: "{{ hotfix_dir }}\\PatrolAgent.exe"
        dest: 'D:\BMC Software\Patrol3\bin\PatrolAgent.exe'
        remote_src: yes

    - name: Copy PatrolAgent.dll from hotfix to Patrol3\bin
      win_copy:
        src: "{{ hotfix_dir }}\\PatrolAgent.dll"
        dest: 'D:\BMC Software\Patrol3\bin\PatrolAgent.dll'
        remote_src: yes

    # -----------------------------------------------------------------------
    # 9. Replace opendatagateway.current in Patrol3\lib
    # -----------------------------------------------------------------------
    - name: Delete existing opendatagateway.current from Patrol3\lib
      win_file:
        path: 'D:\BMC Software\Patrol3\lib\opendatagateway.current'
        state: absent

    - name: Move new opendatagateway.current to Patrol3\lib
      win_copy:
        src: "{{ install_drive }}:\\opendatagateway.current"
        dest: 'D:\BMC Software\Patrol3\lib\opendatagateway.current'
        remote_src: yes

    # -----------------------------------------------------------------------
    # 10. Delete file inside Patrol3\config
    # -----------------------------------------------------------------------
    - name: Find file(s) inside Patrol3\config
      win_find:
        paths: 'D:\BMC Software\Patrol3\config'
      register: config_files

    - name: Delete file(s) inside Patrol3\config
      win_file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ config_files.files }}"

    # -----------------------------------------------------------------------
    # 11. Start PatrolAgent service
    # -----------------------------------------------------------------------
    - name: Start PatrolAgent service
      win_service:
        name: PatrolAgent
        state: started

    - name: Check PatrolAgent service status
      win_service:
        name: PatrolAgent
      register: service_info

    - name: Show PatrolAgent service info
      debug:
        var: service_info

    # -----------------------------------------------------------------------
    # 12. Cleanup
    # -----------------------------------------------------------------------
    - name: Remove extracted install directory
      win_file:
        path: "{{ install_dir }}"
        state: absent

    - name: Remove extracted hotfix directory
      win_file:
        path: "{{ hotfix_dir }}"
        state: absent

    - name: Remove staged opendatagateway.current from root of drive
      win_file:
        path: "{{ install_drive }}:\\opendatagateway.current"
        state: absent

    - name: Remove PowerShell install script
      win_file:
        path: "{{ install_script_dest }}"
        state: absent

    - name: Remove bmc_products folder from D drive
      win_file:
        path: D:\bmc_products
        state: absent
      when: d_exists.stat.exists
