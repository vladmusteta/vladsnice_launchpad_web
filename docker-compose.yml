services:
  backend:
    image: ghcr.io/vladmusteta/vladsnice_launchpad_web/backend:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "${BIND_IP:-0.0.0.0}:${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${DATA_DIR}:/data
      - ${SCRIPTS_DIR}:/data/scripts
      - ${ENVS_DIR}:/data/envs
      - ${LOGS_DIR}:/data/logs
    environment:
      DATA_DIR: /data
    # WireGuard requires NET_ADMIN capability and host network access to tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    # Needed for wg-quick to set up kernel routes
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    devices:
      - /dev/net/tun
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/machines')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/vladmusteta/vladsnice_launchpad_web/frontend:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "${BIND_IP:-0.0.0.0}:${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

