services:
  backend:
    image: ghcr.io/vladko15/monitoring-app-backend:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "${BIND_IP:-0.0.0.0}:${BACKEND_PORT:-8000}:8000"
    volumes:
      # Core data (JSON configs, history, machines) — named volume
      - monitoring_data:/data
      # Override with host directories via .env:
      #   SCRIPTS_DIR=/home/user/my-scripts
      #   ENVS_DIR=/home/user/my-envs
      #   LOGS_DIR=/home/user/my-logs
      - ${SCRIPTS_DIR:-monitoring_scripts}:/data/scripts
      - ${ENVS_DIR:-monitoring_envs}:/data/envs
      - ${LOGS_DIR:-monitoring_logs}:/data/logs
    environment:
      DATA_DIR: /data
    # WireGuard requires NET_ADMIN capability and host network access to tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    # Needed for wg-quick to set up kernel routes
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    devices:
      - /dev/net/tun
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/machines')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/vladko15/monitoring-app-frontend:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "${BIND_IP:-0.0.0.0}:${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  monitoring_data:
  # Named fallback volumes — only used when the corresponding *_DIR env var is not set
  monitoring_scripts:
  monitoring_envs:
  monitoring_logs:
